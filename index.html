<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Météo AI - Prévisions intelligentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-dark: #0284c7;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
        }

        /* Search section */
        .search-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }

        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .search-input {
            flex: 2;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(56,189,248,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
        }

        .geo-btn {
            background: rgba(56,189,248,0.2);
            border: 1px solid var(--accent);
        }

        /* Weather cards */
        .weather-main {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .weather-icon {
            font-size: 80px;
            margin-bottom: 16px;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .weather-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .detail-card {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        .detail-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Forecast */
        .forecast-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--glass-border);
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
        }

        .forecast-card {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            background: rgba(56,189,248,0.1);
        }

        .forecast-day {
            font-weight: 600;
            margin-bottom: 12px;
        }

        .forecast-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .forecast-temp {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .forecast-temp-min {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* AI Advice */
        .ai-advice {
            background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(168,85,247,0.1));
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid var(--glass-border);
        }

        .ai-advice h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .advice-text {
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header h1 { font-size: 1.8rem; }
            .temperature { font-size: 3rem; }
            .forecast-grid { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
            .search-box { flex-direction: column; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weather-main, .forecast-section, .ai-advice {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cloud-sun"></i> Météo AI</h1>
            <p>Prévisions intelligentes avec IA • Géolocalisation</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" class="search-input" placeholder="Entrez une ville... (ex: Paris, Londres, New York)" value="Paris">
                <button class="btn" onclick="searchWeather()">
                    <i class="fas fa-search"></i> Rechercher
                </button>
                <button class="btn btn-outline geo-btn" onclick="getCurrentLocation()">
                    <i class="fas fa-location-dot"></i> Ma position
                </button>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-secondary);">
                <i class="fas fa-microchip"></i> IA intégrée : conseils personnalisés, analyses météo et recommandations intelligentes
            </p>
        </div>

        <div id="weatherContent">
            <!-- Le contenu météo sera généré ici -->
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 20px;">Chargement des données météo...</p>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        // API OpenWeatherMap (gratuite - nécessite inscription)
        // Remplacez par votre clé API : https://openweathermap.org/api
        const OPENWEATHER_API_KEY = "votre_cle_api_openweather"; // À remplacer par votre clé
        const GROQ_API_KEY = "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";
        
        let currentWeatherData = null;

        // ========== GÉOLOCALISATION ==========
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                alert("La géolocalisation n'est pas supportée par votre navigateur");
                return;
            }
            
            document.getElementById("weatherContent").innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px;">Accès à votre position...</p>
                </div>
            `;
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const { latitude, longitude } = position.coords;
                    await getWeatherByCoords(latitude, longitude);
                },
                (error) => {
                    console.error("Erreur géolocalisation:", error);
                    alert("Impossible d'obtenir votre position. Veuillez entrer une ville manuellement.");
                    document.getElementById("weatherContent").innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            <p style="margin-top: 20px;">Erreur de géolocalisation. Utilisation de Paris par défaut...</p>
                        </div>
                    `;
                    setTimeout(() => searchWeather("Paris"), 1500);
                }
            );
        }

        // ========== APPEL API MÉTÉO ==========
        async function getWeatherByCoords(lat, lon) {
            try {
                // Utilisation de l'API OpenWeatherMap ou simulation si pas de clé
                let weatherData;
                
                if (OPENWEATHER_API_KEY !== "votre_cle_api_openweather") {
                    // API réelle
                    const response = await fetch(
                        `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=fr&appid=${OPENWEATHER_API_KEY}`
                    );
                    const forecastResponse = await fetch(
                        `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=fr&cnt=40&appid=${OPENWEATHER_API_KEY}`
                    );
                    
                    if (!response.ok) throw new Error("Erreur API");
                    
                    const current = await response.json();
                    const forecast = await forecastResponse.json();
                    weatherData = { current, forecast };
                } else {
                    // Mode démo avec données simulées
                    weatherData = generateMockWeather(lat, lon);
                }
                
                displayWeather(weatherData);
                await generateAIAdvice(weatherData);
                
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById("weatherContent").innerHTML = `
                    <div style="text-align: center; padding: 40px; background: rgba(0,0,0,0.3); border-radius: 32px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ef4444;"></i>
                        <h3 style="margin-top: 16px;">Erreur météo</h3>
                        <p>Impossible de récupérer les données météo. Vérifiez votre connexion ou votre clé API.</p>
                        <button class="btn" style="margin-top: 20px;" onclick="searchWeather('Paris')">Réessayer</button>
                    </div>
                `;
            }
        }

        async function searchWeather(city = null) {
            const cityName = city || document.getElementById("cityInput").value.trim();
            if (!cityName) return;
            
            document.getElementById("weatherContent").innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px;">Recherche météo pour ${cityName}...</p>
                </div>
            `;
            
            try {
                let weatherData;
                
                if (OPENWEATHER_API_KEY !== "votre_cle_api_openweather") {
                    const response = await fetch(
                        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cityName)}&units=metric&lang=fr&appid=${OPENWEATHER_API_KEY}`
                    );
                    const forecastResponse = await fetch(
                        `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(cityName)}&units=metric&lang=fr&cnt=40&appid=${OPENWEATHER_API_KEY}`
                    );
                    
                    if (!response.ok) throw new Error("Ville introuvable");
                    
                    const current = await response.json();
                    const forecast = await forecastResponse.json();
                    weatherData = { current, forecast };
                } else {
                    weatherData = generateMockWeather(null, null, cityName);
                }
                
                displayWeather(weatherData);
                await generateAIAdvice(weatherData);
                
            } catch (error) {
                document.getElementById("weatherContent").innerHTML = `
                    <div style="text-align: center; padding: 40px; background: rgba(0,0,0,0.3); border-radius: 32px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ef4444;"></i>
                        <h3 style="margin-top: 16px;">Ville introuvable</h3>
                        <p>"${cityName}" n'a pas été trouvé. Vérifiez l'orthographe.</p>
                        <button class="btn" style="margin-top: 20px;" onclick="getCurrentLocation()">Utiliser ma position</button>
                    </div>
                `;
            }
        }

        // ========== DONNÉES MOCK (mode démo) ==========
        function generateMockWeather(lat, lon, cityName = "Paris") {
            const weatherConditions = [
                { main: "Ensoleillé", description: "Ciel dégagé", icon: "☀️", temp: 24, feels_like: 23, humidity: 55, wind_speed: 12 },
                { main: "Nuageux", description: "Ciel partiellement nuageux", icon: "⛅", temp: 18, feels_like: 17, humidity: 65, wind_speed: 15 },
                { main: "Pluvieux", description: "Pluie modérée", icon: "🌧️", temp: 14, feels_like: 12, humidity: 85, wind_speed: 20 },
                { main: "Orageux", description: "Orages épars", icon: "⛈️", temp: 16, feels_like: 15, humidity: 78, wind_speed: 25 },
                { main: "Neigeux", description: "Chutes de neige", icon: "❄️", temp: -2, feels_like: -6, humidity: 90, wind_speed: 10 }
            ];
            
            const randomWeather = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
            
            const cities = {
                "Paris": { name: "Paris", country: "FR" },
                "Londres": { name: "Londres", country: "GB" },
                "New York": { name: "New York", country: "US" },
                "Tokyo": { name: "Tokyo", country: "JP" }
            };
            
            const cityInfo = cities[cityName] || { name: cityName, country: "FR" };
            
            const days = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
            const forecastList = [];
            for (let i = 0; i < 7; i++) {
                const w = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
                forecastList.push({
                    dt_txt: `2024-01-${10 + i} 12:00:00`,
                    main: { temp: w.temp + (Math.random() * 4 - 2), temp_min: w.temp - 3, temp_max: w.temp + 3 },
                    weather: [{ description: w.description, icon: w.icon, main: w.main }]
                });
            }
            
            return {
                current: {
                    name: cityInfo.name,
                    sys: { country: cityInfo.country },
                    main: {
                        temp: randomWeather.temp,
                        feels_like: randomWeather.feels_like,
                        humidity: randomWeather.humidity,
                        pressure: 1013
                    },
                    weather: [{ description: randomWeather.description, icon: randomWeather.icon, main: randomWeather.main }],
                    wind: { speed: randomWeather.wind_speed },
                    dt: Date.now() / 1000
                },
                forecast: { list: forecastList }
            };
        }

        // ========== AFFICHAGE MÉTÉO ==========
        function displayWeather(data) {
            const current = data.current;
            const forecast = data.forecast;
            
            // Icônes météo
            const weatherMain = current.weather[0].main.toLowerCase();
            let iconClass = "";
            if (weatherMain.includes("soleil") || weatherMain.includes("clear")) iconClass = "☀️";
            else if (weatherMain.includes("nuage")) iconClass = "☁️";
            else if (weatherMain.includes("pluie")) iconClass = "🌧️";
            else if (weatherMain.includes("orage")) iconClass = "⛈️";
            else if (weatherMain.includes("neige")) iconClass = "❄️";
            else iconClass = current.weather[0].icon || "🌡️";
            
            // Prévisions
            let forecastHtml = "";
            const dailyForecasts = {};
            forecast.list.forEach(item => {
                const date = new Date(item.dt_txt);
                const day = date.toLocaleDateString('fr-FR', { weekday: 'short' });
                if (!dailyForecasts[day] && Object.keys(dailyForecasts).length < 7) {
                    const temp = Math.round(item.main.temp);
                    const minTemp = Math.round(item.main.temp_min);
                    const icon = item.weather[0].icon.includes("01") ? "☀️" : 
                                 item.weather[0].icon.includes("02") || item.weather[0].icon.includes("03") ? "⛅" :
                                 item.weather[0].icon.includes("09") || item.weather[0].icon.includes("10") ? "🌧️" : "☁️";
                    dailyForecasts[day] = { temp, minTemp, icon, desc: item.weather[0].description };
                }
            });
            
            for (const [day, f] of Object.entries(dailyForecasts)) {
                forecastHtml += `
                    <div class="forecast-card">
                        <div class="forecast-day">${day}</div>
                        <div class="forecast-icon">${f.icon}</div>
                        <div class="forecast-temp">${f.temp}°</div>
                        <div class="forecast-temp-min">${f.minTemp}°</div>
                    </div>
                `;
            }
            
            const html = `
                <div class="weather-main">
                    <div class="weather-icon">${iconClass}</div>
                    <div class="temperature">${Math.round(current.main.temp)}°C</div>
                    <div class="city-name">${current.name}, ${current.sys.country}</div>
                    <div class="weather-desc">${current.weather[0].description}</div>
                    
                    <div class="details-grid">
                        <div class="detail-card">
                            <div class="detail-icon"><i class="fas fa-thermometer-half"></i></div>
                            <div class="detail-value">${Math.round(current.main.feels_like)}°C</div>
                            <div class="detail-label">Ressenti</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon"><i class="fas fa-tint"></i></div>
                            <div class="detail-value">${current.main.humidity}%</div>
                            <div class="detail-label">Humidité</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon"><i class="fas fa-wind"></i></div>
                            <div class="detail-value">${Math.round(current.wind.speed)} km/h</div>
                            <div class="detail-label">Vent</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon"><i class="fas fa-tachometer-alt"></i></div>
                            <div class="detail-value">${current.main.pressure} hPa</div>
                            <div class="detail-label">Pression</div>
                        </div>
                    </div>
                </div>
                
                <div class="forecast-section">
                    <div class="section-title">
                        <i class="fas fa-calendar-week"></i>
                        <span>Prévisions 7 jours</span>
                    </div>
                    <div class="forecast-grid">
                        ${forecastHtml}
                    </div>
                </div>
                
                <div class="ai-advice" id="aiAdvice">
                    <h3><i class="fas fa-brain"></i> Analyse IA</h3>
                    <div class="advice-text">
                        <div class="loading" style="padding: 20px;">
                            <div class="spinner"></div>
                            <p style="margin-top: 12px;">L'IA analyse la météo...</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById("weatherContent").innerHTML = html;
            currentWeatherData = data;
        }

        // ========== IA POUR CONSEILS MÉTÉO ==========
        async function generateAIAdvice(weatherData) {
            const current = weatherData.current;
            const temp = Math.round(current.main.temp);
            const weatherDesc = current.weather[0].description;
            const humidity = current.main.humidity;
            const wind = Math.round(current.wind.speed);
            
            const prompt = `Donne un conseil météo court et utile pour aujourd'hui (2-3 phrases) basé sur: température ${temp}°C, ${weatherDesc}, humidité ${humidity}%, vent ${wind} km/h. Sois pertinent et donne des recommandations pratiques (vêtements, activités, précautions). Réponds en français.`;
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Tu es un expert météo IA. Donne des conseils pratiques et utiles." },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 200
                    })
                });
                
                if (!response.ok) throw new Error("API erreur");
                const data = await response.json();
                const advice = data.choices[0].message.content;
                
                document.getElementById("aiAdvice").innerHTML = `
                    <h3><i class="fas fa-brain"></i> Analyse IA <span style="font-size: 0.7rem; background: rgba(56,189,248,0.2); padding: 2px 8px; border-radius: 20px; margin-left: 8px;">Powered by Groq</span></h3>
                    <div class="advice-text">
                        <p><i class="fas fa-robot" style="margin-right: 8px;"></i> ${advice}</p>
                        <p style="margin-top: 16px; font-size: 0.8rem; color: var(--text-secondary);">
                            <i class="fas fa-lightbulb"></i> Conseil généré par intelligence artificielle
                        </p>
                    </div>
                `;
            } catch (error) {
                console.error("Erreur IA:", error);
                document.getElementById("aiAdvice").innerHTML = `
                    <h3><i class="fas fa-brain"></i> Analyse IA</h3>
                    <div class="advice-text">
                        <p><i class="fas fa-robot"></i> 🌡️ ${temp}°C - ${weatherDesc}. ${humidity > 70 ? "Humidité élevée, pensez à vous hydrater. " : ""}${wind > 20 ? "Vent modéré, couvrez-vous bien. " : ""}${temp < 10 ? "Température fraîche, prenez un manteau. " : temp > 25 ? "Il fait chaud, restez hydraté et évitez le soleil aux heures chaudes. " : "Bonne journée pour sortir !"}</p>
                    </div>
                `;
            }
        }

        // ========== INITIALISATION ==========
        if (OPENWEATHER_API_KEY !== "votre_cle_api_openweather") {
            console.log("✅ API OpenWeather configurée");
        } else {
            console.warn("⚠️ Mode démo - Pour des données réelles, obtenez une clé API gratuite sur openweathermap.org");
        }
        
        // Chargement initial avec Paris
        setTimeout(() => {
            searchWeather("Paris");
        }, 500);
    </script>
</body>
</html>
